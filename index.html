<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>냥이 팡팡</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell" aria-label="피곤하세요? 궁디팡팡해보세요">
      <div class="cat-menu">
        <button id="catMenuToggle" class="cat-menu-toggle" type="button" aria-expanded="false" aria-controls="catPicker">
          치즈냥이
        </button>

        <div id="catPicker" class="cat-picker" aria-label="고양이 선택" hidden>
          <button class="cat-option is-selected" type="button" data-cat="cheese" aria-pressed="true">
            치즈냥이
          </button>
          <button class="cat-option" type="button" data-cat="ddol" aria-pressed="false">
            똘순이
          </button>
        </div>
      </div>

      <section class="stage" aria-live="polite">
        <div class="status">
          <p class="eyebrow">CAT PAT PAT</p>
          <h1>냥이 궁디팡팡</h1>
          <p id="message" class="message">냥이를 불러와요!</p>
        </div>

        <button id="motionToggle" class="motion-toggle" type="button" aria-pressed="false">
          팡팡해주기
        </button>

        <div id="cat" class="cat" data-direction="center">
          <img id="catImage" class="cat-image" src="./image/cheese-C.png" alt="치즈냥이" draggable="false" />
        </div>

        <div class="counter" aria-label="토닥 횟수">
          <span id="count">0</span>
          <span>토닥</span>
        </div>
      </section>

      <nav class="touch-zones" aria-label="토닥 방향 선택">
        <button id="leftZone" class="touch-zone touch-zone-left" type="button" aria-label="왼쪽 엉덩이 토닥">
          <span>왼쪽</span>
        </button>
        <button id="rightZone" class="touch-zone touch-zone-right" type="button" aria-label="오른쪽 엉덩이 토닥">
          <span>오른쪽</span>
        </button>
      </nav>
    </main>

    <div id="motionNotice" class="motion-notice" role="dialog" aria-modal="true" aria-labelledby="motionNoticeTitle" hidden>
      <div class="motion-notice-panel">
        <p id="motionNoticeTitle" class="motion-notice-title">흔들기 기능 안내</p>
        <p class="motion-notice-text">흔들기 기능을 사용하시려면 크롬 브라우저를 통해 실행해주세요.</p>
        <button id="motionNoticeClose" class="motion-notice-close" type="button">확인</button>
      </div>
    </div>

    <div id="pangNotice" class="motion-notice motion-notice-center" role="dialog" aria-modal="true" aria-labelledby="pangNoticeTitle" hidden>
      <div class="motion-notice-panel">
        <p id="pangNoticeTitle" class="motion-notice-title">팡팡해주기</p>
        <p class="motion-notice-text">휴대폰의 좌우 옆 테두리를 두드려 팡팡해보세요!</p>
        <button id="pangNoticeClose" class="motion-notice-close" type="button">확인</button>
      </div>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
